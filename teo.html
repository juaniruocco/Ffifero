<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FacesFifero – Teo Delia · Pack 412</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00FF87;
    --dark: #080c0a;
    --dark3: #141c16;
    --card: #111a13;
    --border: #1e2e21;
    --text: #c8d9cb;
    --white: #f0f7f2;
    --accent: #FFD700;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--dark); color:var(--text); font-family:'Barlow',sans-serif; overflow-x:hidden; }

  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.4;
  }

  /* NAV */
  nav {
    position:sticky; top:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 40px;
    background:rgba(8,12,10,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo { height:34px; width:auto; }
  .nav-back { color:var(--text); text-decoration:none; font-weight:600; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase; transition:color 0.2s; }
  .nav-back:hover { color:var(--green); }
  .nav-pack { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--green); letter-spacing:2px; }

  /* HERO */
  .hero {
    min-height:90vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    position:relative;
    overflow:hidden;
  }

  /* Left: foto real */
  .hero-real {
    position:relative;
    overflow:hidden;
  }

  .hero-real img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center top;
    display:block;
    filter:saturate(0.9);
  }

  .hero-real::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to right, transparent 60%, rgba(8,12,10,0.8) 100%),
               linear-gradient(to top, rgba(8,12,10,0.6) 0%, transparent 40%);
  }

  .real-label {
    position:absolute; top:20px; left:20px; z-index:5;
    background:rgba(0,0,0,0.5); color:rgba(255,255,255,0.7);
    font-size:0.62rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    padding:4px 12px; border-radius:2px; border:1px solid rgba(255,255,255,0.1);
  }

  /* Divider */
  .hero-divider {
    position:absolute; left:50%; top:0; bottom:0; width:3px; z-index:10;
    background:linear-gradient(to bottom, transparent, var(--green) 15%, var(--green) 85%, transparent);
    box-shadow:0 0 20px rgba(0,255,135,0.6), 0 0 60px rgba(0,255,135,0.2);
    transform:translateX(-50%);
  }

  /* Right: FC26 principal */
  .hero-fc {
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#0a1a0c,#0d2010);
  }

  .hero-fc img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center top;
    display:block;
  }

  .hero-fc::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to left, transparent 60%, rgba(8,12,10,0.7) 100%),
               linear-gradient(to top, rgba(8,12,10,0.7) 0%, transparent 40%);
  }

  .fc-label {
    position:absolute; top:20px; right:20px; z-index:5;
    background:rgba(0,255,135,0.12); color:var(--green);
    font-size:0.62rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    padding:4px 12px; border-radius:2px; border:1px solid rgba(0,255,135,0.3);
  }

  /* Name overlay bottom */
  .hero-name {
    position:absolute; bottom:0; left:0; right:0; z-index:10;
    padding:40px 40px 36px;
    background:linear-gradient(to top, rgba(8,12,10,0.95) 0%, transparent 100%);
    display:flex; align-items:flex-end; justify-content:space-between;
    pointer-events:none;
  }

  .hero-name h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(3rem,6vw,5.5rem);
    color:var(--white); line-height:0.9; letter-spacing:2px;
  }

  .hero-name h1 span { color:var(--green); }

  .hero-name-right {
    display:flex; flex-direction:column; align-items:flex-end; gap:6px;
  }

  .member-badge {
    background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.35);
    color:var(--accent); font-size:1rem;
    padding:4px 10px; border-radius:2px;
  }

  .pack-badge {
    background:rgba(0,255,135,0.08); border:1px solid rgba(0,255,135,0.25);
    color:var(--green); font-size:0.68rem; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:4px 12px; border-radius:2px;
  }

  /* GALLERY SECTION */
  .gallery-section {
    max-width:1100px; margin:0 auto; padding:60px 40px 80px;
  }

  .sec-label { font-size:0.72rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--green); margin-bottom:8px; display:block; }
  .sec-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,4vw,3rem); color:var(--white); line-height:1; margin-bottom:32px; letter-spacing:1px; }

  /* Galería 3 imágenes secundarias */
  .gallery-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  .gallery-item {
    position:relative;
    border-radius:4px;
    overflow:hidden;
    border:1px solid var(--border);
    aspect-ratio:3/4;
    cursor:pointer;
    transition:transform 0.2s, border-color 0.2s;
  }

  .gallery-item:hover {
    transform:translateY(-3px);
    border-color:var(--green);
  }

  .gallery-item img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center top;
    display:block;
    transition:transform 0.3s;
  }

  .gallery-item:hover img { transform:scale(1.04); }

  .gallery-item::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:40%;
    background:linear-gradient(to top, rgba(8,12,10,0.7) 0%, transparent 100%);
  }

  /* LIGHTBOX */
  .lightbox {
    display:none; position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.92); backdrop-filter:blur(8px);
    align-items:center; justify-content:center;
  }

  .lightbox.open { display:flex; }

  .lightbox img {
    max-width:90vw; max-height:90vh;
    object-fit:contain; border-radius:4px;
    border:1px solid var(--border);
  }

  .lightbox-close {
    position:absolute; top:24px; right:32px;
    font-size:2rem; color:var(--text); cursor:pointer;
    font-family:'Bebas Neue',sans-serif; letter-spacing:2px;
    transition:color 0.2s;
  }

  .lightbox-close:hover { color:var(--green); }

  /* FOOTER */
  .footer-note {
    text-align:center; padding:32px;
    border-top:1px solid var(--border);
    font-size:0.82rem; color:rgba(200,217,203,0.4);
  }
  .footer-note span { color:var(--green); }
  .footer-note a { color:var(--green); text-decoration:none; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media (max-width:700px) {
    nav { padding:14px 20px; }
    .hero { grid-template-columns:1fr; min-height:auto; }
    .hero-real { height:50vw; }
    .hero-fc { height:60vw; }
    .hero-name { padding:20px; }
    .gallery-section { padding:40px 20px 60px; }
    .gallery-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
